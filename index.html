<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>두루고 밥친구 - 교직원 점심 식사 안내</title>
  
  <!-- SEO Best Practices -->
  <meta name="description" content="두루고등학교 교직원 4교시 수업 현황 및 점심 식사 안내 페이지">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" rel="stylesheet" />
  
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Animated Background -->
  <div class="bg-shape shape-1"></div>
  <div class="bg-shape shape-2"></div>
  <div class="bg-shape shape-3"></div>

  <div class="container">
    <header class="header">
      <div class="header-content glass-card">
        <img src="두루고 로고.png" alt="두루고 로고" class="logo">
        <h1 id="main-title">두루고 오늘의 밥친구</h1>
        
        <nav id="day-tabs" class="day-tabs-container">
          <!-- Mon-Fri tabs will be inserted here -->
        </nav>


      </div>
    </header>

    <main id="main-content">
      <!-- 1. 부서 선택 메뉴 -->
      <section id="selection-view" class="view fadeIn">
        <h2 class="view-title">본인이 계신 곳을 선택해주세요</h2>
        <div id="selection-menu" class="selection-grid">
          <!-- Department buttons will be inserted here -->
        </div>
      </section>

      <!-- 2. 상세 정보 뷰 (초기 숨김) -->
      <section id="detail-view" class="view" style="display: none;">
        <button id="back-btn" class="back-link">← 처음으로 돌아가기</button>
        <div id="app-grid" class="single-card-container">
          <!-- Selected department card will be inserted here -->
        </div>
      </section>
    </main>

    <footer class="footer glass-card">
      <p>© 2026 두루고등학교 | Powered by TW.graphy</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
